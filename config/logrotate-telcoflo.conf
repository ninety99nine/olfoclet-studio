# Copy this file to the server and install as root:
#   sudo cp config/logrotate-telcoflo.conf /etc/logrotate.d/telcoflo
# Logrotate runs daily via cron; copytruncate keeps Supervisor/queue workers safe.

/var/www/telcoflo_studio/storage/logs/*.log {
    daily
    size 100M
    rotate 5
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
